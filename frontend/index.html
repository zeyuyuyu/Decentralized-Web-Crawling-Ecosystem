<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SwarmGov - Level Up Your Governance!</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
</head>
<body class="bg-gradient-to-br from-purple-900 to-indigo-900 text-white min-h-screen">
    <div class="container mx-auto px-4 py-8">
        <!-- Gamified Header with Level/XP -->
        <div class="flex items-center justify-between mb-8 animate__animated animate__fadeIn">
            <div class="flex items-center gap-4">
                <div class="relative">
                    <img id="userAvatar" src="https://api.dicebear.com/6.x/avataaars/svg?seed=random" class="w-16 h-16 rounded-full border-4 border-yellow-400 cursor-pointer hover:scale-110 transition-transform" />
                    <span class="absolute -bottom-2 -right-2 bg-yellow-400 text-black font-bold rounded-full w-8 h-8 flex items-center justify-center">12</span>
                </div>
                <div>
                    <h3 class="text-xl font-bold">Governance Master</h3>
                    <div class="bg-gray-800 rounded-full h-4 w-48 mt-1">
                        <div class="bg-gradient-to-r from-green-400 to-blue-500 h-full rounded-full" style="width: 75%"></div>
                    </div>
                    <span class="text-sm">Level 12 - 750/1000 XP</span>
                </div>
            </div>
            <div class="flex gap-4">
                <button onclick="shareAchievement()" class="bg-blue-500 hover:bg-blue-600 px-4 py-2 rounded-lg flex items-center gap-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z"></path></svg>
                    Share Achievement
                </button>
                <div class="relative">
                    <button class="bg-purple-500 hover:bg-purple-600 px-4 py-2 rounded-lg flex items-center gap-2">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                        Daily Quests
                    </button>
                    <span class="absolute -top-2 -right-2 bg-red-500 text-white text-xs font-bold rounded-full w-5 h-5 flex items-center justify-center animate-pulse">3</span>
                </div>
            </div>
        </div>

        <!-- Leaderboard Section -->
        <div class="bg-gray-800 bg-opacity-50 rounded-xl p-6 mb-8 animate__animated animate__fadeInUp">
            <h2 class="text-2xl font-bold mb-4 flex items-center gap-2">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg>
                Top Contributors This Week
            </h2>
            <div class="space-y-4">
                <div class="flex items-center justify-between bg-gray-700 bg-opacity-50 p-4 rounded-lg hover:bg-opacity-75 transition-colors cursor-pointer">
                    <div class="flex items-center gap-4">
                        <span class="text-yellow-400 font-bold text-xl">1</span>
                        <img src="https://api.dicebear.com/6.x/avataaars/svg?seed=alice" class="w-10 h-10 rounded-full" />
                        <span class="font-medium">CryptoWhisperer</span>
                    </div>
                    <div class="flex items-center gap-2">
                        <span class="text-green-400">+1,240</span>
                        <svg class="w-5 h-5 text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"></path></svg>
                    </div>
                </div>
                <!-- More leaderboard entries... -->
            </div>
        </div>

        <!-- Achievement Showcase -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-gray-800 bg-opacity-50 rounded-xl p-6 transform hover:scale-105 transition-transform cursor-pointer">
                <div class="flex justify-between items-start mb-4">
                    <img src="/assets/badges/pioneer.svg" class="w-16 h-16" />
                    <span class="bg-green-500 text-xs px-2 py-1 rounded-full">New!</span>
                </div>
                <h3 class="font-bold text-lg mb-2">Early Pioneer</h3>
                <p class="text-gray-300 text-sm">One of the first 1000 users to join SwarmGov</p>
            </div>
        </div>

        <div id="confetti-canvas" class="fixed inset-0 pointer-events-none"></div>
    </div>

    <!-- Notification Toast -->
    <div id="toast" class="fixed bottom-4 right-4 bg-green-500 text-white px-6 py-3 rounded-lg shadow-lg transform translate-y-24 transition-transform duration-300 flex items-center gap-2"></div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.4.0/dist/confetti.browser.min.js"></script>
    <script>
        function shareAchievement() {
            // Trigger confetti animation
            confetti({
                particleCount: 100,
                spread: 70,
                origin: { y: 0.6 }
            });

            // Show sharing dialog
            const text = 'I just reached Level 12 on SwarmGov! Join me in building the future of decentralized governance! 🚀';
            const url = 'https://swarmgov.eth';
            
            if (navigator.share) {
                navigator.share({
                    title: 'SwarmGov Achievement',
                    text: text,
                    url: url
                });
            } else {
                // Fallback
                const dummy = document.createElement('textarea');
                document.body.appendChild(dummy);
                dummy.value = `${text} ${url}`;
                dummy.select();
                document.execCommand('copy');
                document.body.removeChild(dummy);
                
                showToast('Link copied to clipboard! 🎉');
            }
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.style.transform = 'translateY(0)';
            setTimeout(() => {
                toast.style.transform = 'translateY(24rem)';
            }, 3000);
        }

        // Simulate notifications/achievements
        setTimeout(() => {
            showToast('🎯 New daily quest available!');
        }, 2000);
    </script>
</body>
</html>
