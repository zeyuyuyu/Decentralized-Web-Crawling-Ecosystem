<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Crawler Quest 🕸️</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
</head>
<body class="bg-gray-900 text-white">
    <div class="container mx-auto px-4 py-8">
        <div class="text-center mb-12">
            <h1 class="text-5xl font-bold mb-4 animate__animated animate__pulse animate__infinite">Web Crawler Quest 🕸️</h1>
            <p class="text-xl text-gray-400">Join thousands of explorers mapping the internet!</p>
        </div>

        <div class="grid md:grid-cols-2 gap-8 mb-12">
            <!-- Live Feed Panel -->
            <div class="bg-gray-800 rounded-lg p-6 shadow-xl">
                <h2 class="text-2xl font-bold mb-4 flex items-center">
                    <span class="animate-ping h-3 w-3 rounded-full bg-green-400 opacity-75 mr-2"></span>
                    Live Discoveries
                </h2>
                <div id="liveFeed" class="h-96 overflow-y-auto">
                    <!-- Dynamic content -->
                </div>
            </div>

            <!-- Leaderboard Panel -->
            <div class="bg-gray-800 rounded-lg p-6 shadow-xl">
                <h2 class="text-2xl font-bold mb-4">🏆 Top Explorers</h2>
                <div id="leaderboard" class="space-y-4">
                    <!-- Dynamic content -->
                </div>
            </div>
        </div>

        <!-- Achievement Badges -->
        <div class="bg-gray-800 rounded-lg p-6 shadow-xl mb-12">
            <h2 class="text-2xl font-bold mb-4">Your Achievements 🌟</h2>
            <div id="achievements" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-4">
                <!-- Dynamic badges -->
            </div>
        </div>

        <!-- Crawler Control Panel -->
        <div class="bg-gray-800 rounded-lg p-6 shadow-xl">
            <h2 class="text-2xl font-bold mb-4">Launch Your Explorer 🚀</h2>
            <div class="flex flex-col md:flex-row gap-4">
                <input type="url" id="startUrl" placeholder="Enter starting URL" class="flex-grow p-3 rounded bg-gray-700 border border-gray-600 focus:border-blue-500 focus:outline-none">
                <button onclick="startCrawling()" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded animate__animated animate__pulse animate__infinite">
                    Start Exploring
                </button>
            </div>
        </div>
    </div>

    <!-- Achievements Pop-up -->
    <div id="achievementPopup" class="fixed bottom-4 right-4 hidden animate__animated animate__fadeInUp">
        <div class="bg-green-600 text-white p-4 rounded-lg shadow-lg">
            <h3 class="font-bold">🎉 New Achievement Unlocked!</h3>
            <p id="achievementText"></p>
        </div>
    </div>

    <script>
        // Simulated data for demonstration
        function startCrawling() {
            showAchievement('First Explorer', 'Started your first web crawling mission!');
            simulateLiveDiscoveries();
        }

        function showAchievement(title, text) {
            const popup = document.getElementById('achievementPopup');
            document.getElementById('achievementText').textContent = `${title}: ${text}`;
            popup.classList.remove('hidden');
            setTimeout(() => popup.classList.add('hidden'), 3000);
        }

        function simulateLiveDiscoveries() {
            const feed = document.getElementById('liveFeed');
            setInterval(() => {
                const discovery = document.createElement('div');
                discovery.className = 'p-2 mb-2 bg-gray-700 rounded animate__animated animate__fadeInLeft';
                discovery.textContent = `Discovered: ${generateRandomUrl()}`;
                feed.insertBefore(discovery, feed.firstChild);
                if (feed.children.length > 10) feed.lastChild.remove();
            }, 2000);
        }

        function generateRandomUrl() {
            const domains = ['tech.com', 'news.net', 'blog.io', 'shop.com'];
            return `https://www.${Math.random().toString(36).substring(7)}.${domains[Math.floor(Math.random() * domains.length)]}`;
        }

        // Initialize demo content
        document.getElementById('leaderboard').innerHTML = [
            {name: '🥇 CyberPioneer', points: '12,453'},
            {name: '🥈 WebExplorer', points: '10,234'},
            {name: '🥉 DataHunter', points: '9,876'}
        ].map(user => `
            <div class="flex justify-between items-center p-3 bg-gray-700 rounded animate__animated animate__fadeIn">
                <span>${user.name}</span>
                <span class="text-green-400">${user.points} pts</span>
            </div>
        `).join('');
    </script>
</body>
</html>
